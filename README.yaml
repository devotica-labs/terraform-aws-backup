description: |-
  Terraform module for **AWS Backup** — a KMS-encrypted backup vault, a plan
  with one or more scheduled rules, a resource/tag selection, and a dedicated
  service role. Ships a fintech baseline: encrypted vault, a daily rule with
  35-day retention, optional cold storage, and an optional compliance vault
  lock (WORM).

introduction: |-
  This module creates an [AWS Backup](https://docs.aws.amazon.com/aws-backup/latest/devguide/whatisbackup.html)
  vault (`aws_backup_vault`), a plan (`aws_backup_plan`) with dynamic scheduled
  rules, a selection (`aws_backup_selection`) driven by explicit resource ARNs
  and/or tags, and — unless an existing `backup_role_arn` is supplied — a
  dedicated IAM service role trusting `backup.amazonaws.com` with the AWS-managed
  backup and restore policies. An optional `aws_backup_vault_lock_configuration`
  enables compliance-mode WORM retention.

usage: |-
  See [`examples/complete`](examples/complete) for the full surface (tiered
  rules, cold storage, a customer-managed key, and a vault lock) and
  [`examples/basic`](examples/basic) for a tag-selected daily backup with a
  35-day retention.

